<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" width="1200" height="400">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#050a10"/>
      <stop offset="50%" stop-color="#0a1118"/>
      <stop offset="100%" stop-color="#142033"/>
    </linearGradient>

    <!-- Glowing Orbs -->
    <radialGradient id="glow1" cx="20%" cy="30%" r="50%">
      <stop offset="0%" stop-color="#146fd6" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#146fd6" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="80%" cy="80%" r="50%">
      <stop offset="0%" stop-color="#0fa48f" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#0fa48f" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow3" cx="70%" cy="20%" r="40%">
      <stop offset="0%" stop-color="#118ab2" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#118ab2" stop-opacity="0"/>
    </radialGradient>

    <!-- Logo Elements -->
    <filter id="beam-dark" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="0" stdDeviation="15" flood-color="#146fd6" flood-opacity="0.8"/>
    </filter>
    <linearGradient id="grad-dark" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="1"/>
    </linearGradient>

    <!-- Grid Pattern -->
    <pattern id="pattern-grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
    </pattern>

    <!-- Subtle Scanlines -->
    <pattern id="scanlines" width="4" height="4" patternUnits="userSpaceOnUse">
      <path d="M 0 0 L 4 0 L 4 2 L 0 2 Z" fill="rgba(0,0,0,0.15)" stroke="none"/>
    </pattern>
  </defs>

  <!-- Background Base -->
  <rect width="1200" height="400" fill="url(#bg)" />
  <rect width="1200" height="400" fill="url(#pattern-grid)" />

  <!-- Glowing Areas -->
  <circle cx="20%" cy="30%" r="600" fill="url(#glow1)" />
  <circle cx="80%" cy="80%" r="500" fill="url(#glow2)" />
  <circle cx="70%" cy="20%" r="400" fill="url(#glow3)" />

  <!-- CRT Scanlines for Texture -->
  <rect width="1200" height="400" fill="url(#scanlines)" />

  <!-- Accent lines top & bottom -->
  <rect x="0" y="0" width="1200" height="4" fill="#146fd6" />
  <rect x="0" y="396" width="1200" height="4" fill="#0fa48f" />

  <!-- LOGO (Scaled and Positioned inside a group) -->
  <!-- Centered vertically on the left side of the text -->
  <g transform="translate(180, 70) scale(2.8)">
    <polygon points="0,48 26,48 19,62 0,62" fill="url(#grad-dark)" filter="url(#beam-dark)" />
    <!-- Glass prism effect -->
    <polygon points="40,20 70,80 10,80" fill="#111a24" stroke="rgba(255,255,255,0.25)" stroke-width="1.5px" />
    <path d="M 40 20 L 70 80 L 10 80 Z" fill="rgba(255,255,255,0.02)" />
    <!-- Rainbow dispersion -->
    <polygon points="40,20 100,5 100,35 50,40" fill="#146fd6" />
    <polygon points="50,40 100,35 100,65 60,60" fill="#118ab2" />
    <polygon points="60,60 100,65 100,95 70,80" fill="#0fa48f" />
  </g>

  <!-- Text Section -->
  <g transform="translate(500, 192)">
    <text x="0" y="0" font-family="'Inter', system-ui, -apple-system, sans-serif" font-size="76" font-weight="900" fill="#ffffff" letter-spacing="-2.5">
      WebP Lab<tspan fill="#146fd6">.</tspan>
    </text>
    <text x="4" y="52" font-family="'Inter', system-ui, -apple-system, sans-serif" font-size="26" font-weight="400" fill="#94a3b8" letter-spacing="0.5">
      Professional Image Optimization Suite
    </text>
  </g>

  <!-- Feature Tags / Badges manually drawn to look slick -->
  <g transform="translate(505, 275)">
    <!-- Badge 1: Next.js 15 -->
    <g transform="translate(0, 0)">
      <rect x="0" y="0" width="115" height="34" rx="17" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.15)"/>
      <circle cx="17" cy="17" r="4" fill="#ffffff" />
      <text x="30" y="22" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="500" fill="#ffffff">Next.js 15</text>
    </g>

    <!-- Badge 2: Sharp Engine -->
    <g transform="translate(125, 0)">
      <rect x="0" y="0" width="140" height="34" rx="17" fill="rgba(48,165,60,0.1)" stroke="rgba(48,165,60,0.3)"/>
      <circle cx="17" cy="17" r="4" fill="#5ce872" />
      <text x="30" y="22" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="500" fill="#5ce872">Sharp Engine</text>
    </g>

    <!-- Badge 3: Privacy First -->
    <g transform="translate(275, 0)">
      <rect x="0" y="0" width="135" height="34" rx="17" fill="rgba(20,111,214,0.1)" stroke="rgba(20,111,214,0.3)"/>
      <circle cx="17" cy="17" r="4" fill="#6ba7f2" />
      <text x="30" y="22" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="500" fill="#6ba7f2">Privacy First</text>
    </g>
  </g>
  
  <!-- Subtle UI Chrome to look like an app -->
  <g transform="translate(1080, 30)">
    <circle cx="0" cy="0" r="5" fill="#3f3f46" />
    <circle cx="20" cy="0" r="5" fill="#3f3f46" />
    <circle cx="40" cy="0" r="5" fill="#3f3f46" />
  </g>
  
</svg>
